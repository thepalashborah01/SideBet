<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matchday Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --turf:#1e4d3b;
    --turf-deep:#0f2e21;
    --turf-light:#2f6b4f;
    --paper:#faf7ef;
    --chalk:#f2f6f0;
    --ink:#12241b;
    --amber:#ffb100;
    --amber-deep:#c98600;
    --line: rgba(18,36,27,0.16);
    --red: #c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 50% 0%, var(--turf-light) 0%, var(--turf) 45%, var(--turf-deep) 100%);
    color:var(--chalk);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding:0 0 60px 0;
  }
  .pitch-lines{
    position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0.06;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 78px, #fff 78px, #fff 79px),
      repeating-linear-gradient(90deg, transparent, transparent 78px, #fff 78px, #fff 79px);
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 0;position:relative;z-index:1;}

  header.hero{text-align:center;margin-bottom:22px;}
  .badge-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:54px;height:54px;border-radius:50%;
    background:var(--amber);color:var(--turf-deep);
    font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;
    border:3px solid var(--chalk); margin-bottom:10px;
  }
  .logo-crest{ display:flex; justify-content:center; margin-bottom:8px; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.3)); }
  h1.title{
    font-family:'Oswald',sans-serif;font-weight:700;
    font-size:clamp(32px,7vw,46px);
    letter-spacing:1px; margin:0; text-transform:uppercase;
    color:var(--chalk);
  }
  .subtitle{
    font-family:'Space Mono',monospace; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:var(--amber); margin-top:6px;
  }

  nav.tabs{
    display:flex; gap:6px; background:rgba(0,0,0,0.18);
    padding:6px; border-radius:14px; margin-bottom:22px;
    overflow-x:auto;
  }
  nav.tabs button{
    flex:1; white-space:nowrap; padding:11px 10px; border:none; border-radius:10px;
    background:transparent; color:var(--chalk); opacity:0.6;
    font-family:'Oswald',sans-serif; font-weight:500; font-size:14px;
    letter-spacing:0.5px; text-transform:uppercase; cursor:pointer;
    transition:all .15s ease;
  }
  nav.tabs button.active{ background:var(--amber); color:var(--turf-deep); opacity:1; font-weight:700; }
  nav.tabs button:hover:not(.active){opacity:0.9;}

  .card{
    background:var(--paper); color:var(--ink); border-radius:16px;
    padding:20px; margin-bottom:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }

  /* Ticket stub match card */
  .ticket{
    background:var(--paper); color:var(--ink); border-radius:14px;
    margin-bottom:14px; box-shadow:0 8px 22px rgba(0,0,0,0.22);
    display:flex; overflow:hidden; position:relative;
  }
  .ticket .stub{
    width:64px; flex-shrink:0; background:var(--turf-deep); color:var(--amber);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-weight:600; font-size:11px;
    letter-spacing:1px; text-transform:uppercase; padding:8px 4px; text-align:center;
    position:relative;
  }
  .ticket .stub::after{
    content:''; position:absolute; right:-1px; top:0; bottom:0; width:0;
    border-right:2px dashed rgba(250,247,239,0.4);
  }
  .ticket .stub .rw{ font-family:'Space Mono',monospace; font-size:16px; color:var(--chalk); margin-top:4px;}
  .ticket .body{ flex:1; padding:14px 16px; }
  .match-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .team{ display:flex; align-items:center; gap:8px; font-family:'Oswald',sans-serif; font-size:17px; font-weight:600; flex:1;}
  .flag-chip{ width:24px; height:18px; object-fit:cover; border-radius:3px; box-shadow:0 0 0 1px var(--line); flex-shrink:0; }
  .flag-chip-placeholder{ display:inline-flex; align-items:center; justify-content:center; background:var(--line); color:var(--ink); font-family:'Space Mono',monospace; font-size:11px; }
  .team .flag{ font-size:20px; }
  .vs{ font-family:'Space Mono',monospace; font-size:11px; opacity:0.45; padding:0 6px;}
  .meta-line{ font-family:'Space Mono',monospace; font-size:11px; opacity:0.55; margin-top:6px; }

  .score-input-row{ display:flex; align-items:center; justify-content:center; gap:10px; margin-top:12px; }
  .score-input-row input{
    width:52px; text-align:center; font-family:'Space Mono',monospace; font-size:20px;
    padding:8px 0; border:2px solid var(--line); border-radius:8px; background:#fff; color:var(--ink);
  }
  .score-input-row input:focus{ outline:none; border-color:var(--turf); }
  .score-dash{ font-family:'Space Mono',monospace; font-size:18px; opacity:0.4; }

  .locked-tag, .status-tag{
    font-family:'Space Mono',monospace; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    padding:3px 8px; border-radius:20px; display:inline-block;
  }
  .locked-tag{ background:rgba(192,57,43,0.12); color:var(--red); }
  .status-tag.live{ background:rgba(255,177,0,0.18); color:var(--amber-deep); }
  .status-tag.done{ background:rgba(30,77,59,0.12); color:var(--turf); }

  .result-line{
    display:flex; align-items:center; justify-content:center; gap:14px; margin-top:10px;
    font-family:'Space Mono',monospace;
  }
  .final-score{ font-size:26px; font-weight:700; color:var(--turf-deep); }
  .points-pill{
    font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; padding:4px 10px;
    border-radius:20px; background:var(--turf); color:var(--chalk);
  }
  .points-pill.zero{ background:var(--line); color:var(--ink); opacity:0.6; }

  .your-pick-note{ text-align:center; font-size:12px; opacity:0.65; margin-top:6px; font-family:'Inter',sans-serif;}

  button.primary{
    background:var(--turf); color:var(--chalk); border:none; border-radius:10px;
    padding:12px 18px; font-family:'Oswald',sans-serif; font-weight:600; font-size:14px;
    letter-spacing:0.5px; text-transform:uppercase; cursor:pointer; width:100%;
  }
  button.primary:hover{ background:var(--turf-light); }
  button.amber{ background:var(--amber); color:var(--turf-deep); }
  button.amber:hover{ background:var(--amber-deep); color:#fff; }
  button.ghost{
    background:transparent; border:2px solid var(--line); color:var(--ink);
    border-radius:10px; padding:10px 14px; font-family:'Oswald',sans-serif; font-weight:600;
    cursor:pointer; text-transform:uppercase; font-size:13px;
  }

  input[type=text]{
    width:100%; padding:12px 14px; border-radius:10px; border:2px solid var(--line);
    font-family:'Inter',sans-serif; font-size:15px; background:#fff; color:var(--ink);
  }
  select{
    width:100%; padding:12px 14px; border-radius:10px; border:2px solid var(--line);
    font-family:'Inter',sans-serif; font-size:15px; background:#fff; color:var(--ink);
  }
  label.field-label{
    display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:1px;
    text-transform:uppercase; opacity:0.6; margin-bottom:6px; margin-top:16px;
  }

  /* Scoreboard leaderboard */
  .lb-row{
    display:flex; align-items:center; gap:14px; padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .lb-row:last-child{ border-bottom:none; }
  .rank-shirt{
    width:38px; height:38px; border-radius:8px; background:var(--turf);
    color:var(--chalk); display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:16px; flex-shrink:0;
  }
  .rank-shirt.gold{ background:var(--amber); color:var(--turf-deep); }
  .lb-name{ flex:1; font-family:'Oswald',sans-serif; font-weight:600; font-size:16px; }
  .lb-sub{ font-family:'Space Mono',monospace; font-size:11px; opacity:0.55; margin-top:2px; }
  .flip-score{
    font-family:'Space Mono',monospace; font-weight:700; font-size:22px;
    background:var(--turf-deep); color:var(--amber); padding:6px 12px; border-radius:8px;
    min-width:52px; text-align:center;
  }

  .empty-state{ text-align:center; padding:30px 10px; opacity:0.7; font-size:14px; }
  .round-heading{
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:1.5px;
    font-size:13px; color:var(--amber); margin:22px 0 10px 4px; font-weight:600;
  }
  .join-screen{ text-align:center; padding-top:40px; }
  .join-screen p{ opacity:0.85; line-height:1.5; max-width:420px; margin:10px auto 20px; }

  .admin-match-row{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; align-items:center;}
  .admin-match-row input{ padding:8px 10px; font-size:13px; }
  .admin-teams-row{ display:flex; gap:8px; align-items:center; margin-bottom:6px; font-size:13px; font-family:'Space Mono',monospace;}
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line); }
  .switch{ position:relative; width:44px; height:24px; }
  .switch input{ opacity:0; width:0; height:0; }
  .slider{ position:absolute; cursor:pointer; inset:0; background:var(--line); border-radius:24px; transition:.2s; }
  .slider::before{ content:''; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .slider{ background:var(--turf); }
  input:checked + .slider::before{ transform:translateX(20px); }

  .footer-note{ text-align:center; font-size:11px; opacity:0.4; margin-top:26px; font-family:'Space Mono',monospace;}
  ::-webkit-scrollbar{height:6px;}
</style>
</head>
<body>
<div class="pitch-lines"></div>
<div class="wrap" id="app"></div>

<script>
const ROUND_META = {
  R16:{label:'Round of 16', weight:1},
  QF:{label:'Quarter-final', weight:2},
  SF:{label:'Semi-final', weight:3},
  TP:{label:'3rd Place Playoff', weight:1},
  F:{label:'Final', weight:4}
};

const DEFAULT_MATCHES = [
  {id:'r16-1', round:'R16', teamA:'Morocco', teamB:'Canada', kickoff:'Sat Jul 4 · Houston', status:'completed', scoreA:3, scoreB:0},
  {id:'r16-2', round:'R16', teamA:'France', teamB:'Paraguay', kickoff:'Sat Jul 4 · Philadelphia', status:'completed', scoreA:1, scoreB:0},
  {id:'r16-3', round:'R16', teamA:'Norway', teamB:'Brazil', kickoff:'Sun Jul 5 · New York/NJ', status:'completed', scoreA:2, scoreB:1},
  {id:'r16-4', round:'R16', teamA:'England', teamB:'Mexico', kickoff:'Sun Jul 5 · Mexico City', status:'completed', scoreA:3, scoreB:2},
  {id:'r16-5', round:'R16', teamA:'Portugal', teamB:'Spain', kickoff:'Mon Jul 6 · Dallas', status:'upcoming', scoreA:null, scoreB:null},
  {id:'r16-6', round:'R16', teamA:'USA', teamB:'Belgium', kickoff:'Mon Jul 6 · Seattle', status:'upcoming', scoreA:null, scoreB:null},
  {id:'r16-7', round:'R16', teamA:'Argentina', teamB:'Egypt', kickoff:'Tue Jul 7 · Atlanta', status:'upcoming', scoreA:null, scoreB:null},
  {id:'r16-8', round:'R16', teamA:'Switzerland', teamB:'Colombia', kickoff:'Tue Jul 7 · Kansas City', status:'upcoming', scoreA:null, scoreB:null},
  {id:'qf-1', round:'QF', teamA:'England', teamB:'Norway', kickoff:'Sat Jul 11 · Miami', status:'upcoming', scoreA:null, scoreB:null},
  {id:'qf-2', round:'QF', teamA:'TBD', teamB:'TBD', kickoff:'TBD', status:'upcoming', scoreA:null, scoreB:null},
  {id:'qf-3', round:'QF', teamA:'TBD', teamB:'TBD', kickoff:'TBD', status:'upcoming', scoreA:null, scoreB:null},
  {id:'qf-4', round:'QF', teamA:'TBD', teamB:'TBD', kickoff:'TBD', status:'upcoming', scoreA:null, scoreB:null},
  {id:'sf-1', round:'SF', teamA:'TBD', teamB:'TBD', kickoff:'TBD', status:'upcoming', scoreA:null, scoreB:null},
  {id:'sf-2', round:'SF', teamA:'TBD', teamB:'TBD', kickoff:'TBD', status:'upcoming', scoreA:null, scoreB:null},
  {id:'tp-1', round:'TP', teamA:'TBD', teamB:'TBD', kickoff:'Fri Jul 18 · Miami', status:'upcoming', scoreA:null, scoreB:null},
  {id:'f-1', round:'F', teamA:'TBD', teamB:'TBD', kickoff:'Sun Jul 19 · New York/NJ', status:'upcoming', scoreA:null, scoreB:null},
];

const FLAG_CODES = {
  'Morocco':'ma','Canada':'ca','France':'fr','Paraguay':'py','Norway':'no','Brazil':'br',
  'England':'gb-eng','Mexico':'mx','Portugal':'pt','Spain':'es','USA':'us','Belgium':'be',
  'Argentina':'ar','Egypt':'eg','Switzerland':'ch','Colombia':'co'
};

function flagTag(teamName){
  const code = FLAG_CODES[teamName];
  if(!code){
    return `<span class="flag-chip flag-chip-placeholder">?</span>`;
  }
  return `<img class="flag-chip" src="https://flagcdn.com/48x36/${code}.png" alt="${teamName} flag" width="24" height="18">`;
}

const CHAMPION_OPTIONS = ['Morocco','France','Norway','England','Portugal','Spain','USA','Belgium','Argentina','Egypt','Switzerland','Colombia'];

let state = {
  name: null,
  poolCode: null,
  tab: 'leaderboard',
  matches: null,
  players: [],
  predictions: {},
  config: { tournamentLocked:false, actualChampion:'', actualGoldenBoot:'' },
  adminMode: false,
  loading: true,
  joinError: '',
  confirmSwitch: false
};

const FIREBASE_URL = 'https://matchday-pool-default-rtdb.asia-southeast1.firebasedatabase.app';

function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars
  let code = '';
  for(let i=0;i<8;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function slugify(str){
  return String(str).trim().replace(/[.#$\[\]]/g, '').replace(/\s+/g, '_') || 'player';
}

// Personal, low-stakes identity only — safe to lose if the app is ever republished.
function safeGet(key){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch(e){ console.error('localStorage get failed', key, e); return null; }
}
function safeSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }
  catch(e){ console.error('localStorage set failed', key, e); }
}

// Real game data — lives in Firebase, independent of Claude publishing/versioning.
async function fbGet(path){
  try{
    const res = await fetch(`${FIREBASE_URL}/${path}.json`);
    if(!res.ok) return null;
    return await res.json();
  }catch(e){ console.error('firebase get failed', path, e); return null; }
}
async function fbSet(path, value){
  try{
    const res = await fetch(`${FIREBASE_URL}/${path}.json`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(value)
    });
    return res.ok;
  }catch(e){ console.error('firebase set failed', path, e); return false; }
}

function poolPath(suffix){ return `pools/${state.poolCode}/${suffix}`; }
function predPath(name){ return `pools/${state.poolCode}/predictions/${slugify(name)}`; }

async function withButtonFeedback(btn, actionFn, successLabel){
  const originalLabel = btn.textContent;
  const originalBg = btn.style.background;
  btn.disabled = true;
  btn.textContent = 'Saving…';
  let ok = false;
  try{ ok = await actionFn(); }catch(e){ console.error(e); ok = false; }
  if(ok){
    btn.textContent = successLabel || 'Saved ✓';
    btn.style.background = 'var(--turf)';
    btn.style.color = 'var(--chalk)';
    setTimeout(()=>{ render(); }, 800);
  } else {
    btn.textContent = 'Failed — tap to retry';
    btn.style.background = 'var(--red)';
    btn.style.color = '#fff';
    btn.disabled = false;
    setTimeout(()=>{
      if(document.body.contains(btn)){
        btn.textContent = originalLabel;
        btn.style.background = originalBg;
        btn.style.color = '';
      }
    }, 2200);
  }
  return ok;
}

async function init(){
  const myName = safeGet('my_name');
  const myPoolCode = safeGet('my_pool_code');
  state.name = myName;
  state.poolCode = myPoolCode;

  if(state.name && state.poolCode){
    await loadPoolData();
  }

  state.loading = false;
  render();
}

async function loadPoolData(){
  let matches = await fbGet(poolPath('matches'));
  if(!matches){ matches = JSON.parse(JSON.stringify(DEFAULT_MATCHES)); await fbSet(poolPath('matches'), matches); }
  state.matches = matches;

  let players = await fbGet(poolPath('players'));
  state.players = players || [];

  let config = await fbGet(poolPath('config'));
  state.config = config || { tournamentLocked:false, actualChampion:'', actualGoldenBoot:'' };

  let allPreds = await fbGet(poolPath('predictions'));
  state.predictions = {};
  for(const p of state.players){
    const rec = allPreds ? allPreds[slugify(p)] : null;
    state.predictions[p] = rec || { matches:{}, champion:'', goldenBoot:'' };
  }
  if(state.name && !state.predictions[state.name]){
    state.predictions[state.name] = { matches:{}, champion:'', goldenBoot:'' };
  }
}

async function createPool(name){
  name = name.trim();
  if(!name){ state.joinError = 'Enter your name first.'; render(); return; }
  let code = genCode();
  // extremely unlikely, but avoid clobbering an existing pool on a collision
  for(let i=0;i<3;i++){
    const clash = await fbGet(`pools/${code}/matches`);
    if(!clash) break;
    code = genCode();
  }
  safeSet('my_name', name);
  safeSet('my_pool_code', code);
  state.name = name;
  state.poolCode = code;
  state.joinError = '';
  await loadPoolData();
  await addSelfToPool(name);
  render();
}

async function joinExistingPool(name, code){
  name = name.trim();
  code = code.trim().toUpperCase();
  if(!name){ state.joinError = 'Enter your name first.'; render(); return; }
  if(!code){ state.joinError = 'Enter the pool code your friend shared.'; render(); return; }
  state.poolCode = code;
  const matchesExisting = await fbGet(poolPath('matches'));
  if(!matchesExisting){
    state.joinError = `No pool found with code ${code}. Double-check it with whoever created it.`;
    state.poolCode = null;
    render();
    return;
  }
  safeSet('my_name', name);
  safeSet('my_pool_code', code);
  state.name = name;
  state.joinError = '';
  await loadPoolData();
  await addSelfToPool(name);
  render();
}

async function addSelfToPool(name){
  if(!state.players.includes(name)){
    state.players.push(name);
    await fbSet(poolPath('players'), state.players);
  }
  if(!state.predictions[name]){
    state.predictions[name] = { matches:{}, champion:'', goldenBoot:'' };
    await fbSet(predPath(name), state.predictions[name]);
  }
}

async function leavePool(){
  safeSet('my_name', '');
  safeSet('my_pool_code', '');
  state.name = null;
  state.poolCode = null;
  state.matches = null;
  state.players = [];
  state.predictions = {};
  state.tab = 'leaderboard';
  render();
}

async function savePrediction(matchId, scoreA, scoreB, penaltyWinner){
  const me = state.predictions[state.name];
  me.matches[matchId] = { scoreA, scoreB, penaltyWinner: penaltyWinner || null };
  return await fbSet(predPath(state.name), me);
}

async function saveTournamentPicks(champion, goldenBoot){
  const me = state.predictions[state.name];
  me.champion = champion;
  me.goldenBoot = goldenBoot;
  return await fbSet(predPath(state.name), me);
}

async function adminSaveResult(matchId, scoreA, scoreB, status, penaltyWinner){
  const m = state.matches.find(x=>x.id===matchId);
  const prevA = m.scoreA, prevB = m.scoreB, prevStatus = m.status, prevPen = m.penaltyWinner;
  m.scoreA = scoreA===''? null : parseInt(scoreA);
  m.scoreB = scoreB===''? null : parseInt(scoreB);
  m.status = status;
  m.penaltyWinner = penaltyWinner || null;
  const ok = await fbSet(poolPath('matches'), state.matches);
  if(!ok){ m.scoreA = prevA; m.scoreB = prevB; m.status = prevStatus; m.penaltyWinner = prevPen; }
  return ok;
}

async function adminSaveTeams(matchId, teamA, teamB, kickoff){
  const m = state.matches.find(x=>x.id===matchId);
  const prev = { teamA:m.teamA, teamB:m.teamB, kickoff:m.kickoff };
  m.teamA = teamA || 'TBD';
  m.teamB = teamB || 'TBD';
  m.kickoff = kickoff || 'TBD';
  const ok = await fbSet(poolPath('matches'), state.matches);
  if(!ok){ m.teamA = prev.teamA; m.teamB = prev.teamB; m.kickoff = prev.kickoff; }
  return ok;
}

async function adminSaveConfig(){
  const ok = await fbSet(poolPath('config'), state.config);
  render();
  return ok;
}

async function adminSaveConfigSilent(){
  return await fbSet(poolPath('config'), state.config);
}

function matchWinner(scoreA, scoreB, penaltyWinner){
  if(scoreA === scoreB) return penaltyWinner || null; // 'A' or 'B', or null if undecided
  return scoreA > scoreB ? 'A' : 'B';
}

function computeScore(playerName){
  const pred = state.predictions[playerName];
  if(!pred) return {points:0, correctWinners:0, exactScores:0, totalPlayed:0};
  let points = 0, correctWinners = 0, exactScores = 0, totalPlayed=0;
  for(const m of state.matches){
    if(m.status !== 'completed') continue;
    totalPlayed++;
    const p = pred.matches[m.id];
    if(!p || p.scoreA===undefined || p.scoreA===null || p.scoreB===null || p.scoreB===undefined) continue;
    const weight = ROUND_META[m.round].weight;
    const actualWinner = matchWinner(m.scoreA, m.scoreB, m.penaltyWinner);
    const predWinner = matchWinner(p.scoreA, p.scoreB, p.penaltyWinner);
    if(predWinner && predWinner===actualWinner){
      points += 1*weight;
      correctWinners++;
    }
    if(p.scoreA===m.scoreA && p.scoreB===m.scoreB){
      points += 2*weight;
      exactScores++;
    }
  }
  if(state.config.actualChampion && pred.champion && pred.champion===state.config.actualChampion){
    points += 10;
  }
  if(state.config.actualGoldenBoot && pred.goldenBoot && pred.goldenBoot.trim().toLowerCase()===state.config.actualGoldenBoot.trim().toLowerCase()){
    points += 5;
  }
  return {points, correctWinners, exactScores, totalPlayed};
}

function pointsForMatch(playerName, m){
  const pred = state.predictions[playerName];
  if(!pred) return 0;
  const p = pred.matches[m.id];
  if(!p || p.scoreA===undefined || p.scoreA===null || p.scoreB===null || p.scoreB===undefined) return 0;
  const weight = ROUND_META[m.round].weight;
  let pts = 0;
  const actualWinner = matchWinner(m.scoreA, m.scoreB, m.penaltyWinner);
  const predWinner = matchWinner(p.scoreA, p.scoreB, p.penaltyWinner);
  if(predWinner && predWinner===actualWinner) pts += 1*weight;
  if(p.scoreA===m.scoreA && p.scoreB===m.scoreB) pts += 2*weight;
  return pts;
}

  const grouped = {};
  state.matches.forEach(m=>{

  Object.keys(ROUND_META).forEach(roundKey=>{

function renderMatchTicket(m){
  const pred = state.predictions[state.name].matches[m.id] || {};
  const isTBD = m.teamA==='TBD' || m.teamB==='TBD';
  const isCompleted = m.status==='completed';
  const isLive = m.status==='live';
  const hasSavedPick = pred.scoreA!==undefined && pred.scoreA!==null && pred.scoreB!==undefined && pred.scoreB!==null;

  const ticket = el(`
    <div class="ticket">
      <div class="stub">${m.round}<div class="rw">${ROUND_META[m.round].weight}×</div></div>
      <div class="body"></div>
    </div>
  `);
  const body = ticket.querySelector('.body');

  const statusTag = isCompleted ? `<span class="status-tag done">Final</span>` : isLive ? `<span class="status-tag live">Live</span>` : (isTBD ? '' : `<span class="locked-tag">Predict now</span>`);

  body.appendChild(el(`
    <div class="match-row">
      <div class="team">${flagTag(m.teamA)}${m.teamA}</div>
      <div class="vs">VS</div>
      <div class="team" style="justify-content:flex-end; text-align:right;">${m.teamB}${flagTag(m.teamB)}</div>
    </div>
  `));
  body.appendChild(el(`<div class="meta-line">${m.kickoff} ${statusTag}</div>`));

  if(isTBD){
    body.appendChild(el(`<div class="your-pick-note">Matchup not set yet</div>`));
    return ticket;
  }

  if(isCompleted){
    const pts = pointsForMatch(state.name, m);
    const wasDraw = m.scoreA===m.scoreB;
    const penNote = wasDraw && m.penaltyWinner ? ` <span style="opacity:0.7;">(${m.penaltyWinner==='A'?m.teamA:m.teamB} won on penalties)</span>` : '';
    body.appendChild(el(`
      <div class="result-line">
        <div class="final-score">${m.scoreA} – ${m.scoreB}</div>
        <div class="points-pill ${pts===0?'zero':''}">${pts>0? '+'+pts+' pts' : (hasSavedPick?'0 pts':'no pick')}</div>
      </div>
    `));
    if(penNote) body.appendChild(el(`<div class="your-pick-note">${penNote}</div>`));
    if(hasSavedPick){
      const predPenNote = pred.scoreA===pred.scoreB && pred.penaltyWinner ? ` (${pred.penaltyWinner==='A'?m.teamA:m.teamB} on penalties)` : '';
      body.appendChild(el(`<div class="your-pick-note">Your pick was ${pred.scoreA} – ${pred.scoreB}${predPenNote}</div>`));
    }
  } else {
    const row = el(`
      <div class="score-input-row">
        <input type="number" min="0" max="20" id="sa-${m.id}" value="${pred.scoreA ?? ''}" placeholder="0">
        <div class="score-dash">–</div>
        <input type="number" min="0" max="20" id="sb-${m.id}" value="${pred.scoreB ?? ''}" placeholder="0">
      </div>
    `);
    body.appendChild(row);

    const penBox = el(`<div class="pen-box" style="display:none; margin-top:12px;"></div>`);
    penBox.appendChild(el(`<div class="your-pick-note" style="margin-bottom:6px;">Level after 90 — who wins the shootout?</div>`));
    const penRow = el(`<div style="display:flex; gap:8px;"></div>`);
    const btnA = el(`<button type="button" class="ghost" style="flex:1; font-size:12px; padding:8px;">${m.teamA}</button>`);
    const btnB = el(`<button type="button" class="ghost" style="flex:1; font-size:12px; padding:8px;">${m.teamB}</button>`);
    penRow.appendChild(btnA); penRow.appendChild(btnB);
    penBox.appendChild(penRow);
    body.appendChild(penBox);

    let selectedPenalty = pred.penaltyWinner || null;
    function highlightPenalty(){
      btnA.style.background = selectedPenalty==='A' ? 'var(--turf)' : '';
      btnA.style.color = selectedPenalty==='A' ? 'var(--chalk)' : '';
      btnB.style.background = selectedPenalty==='B' ? 'var(--turf)' : '';
      btnB.style.color = selectedPenalty==='B' ? 'var(--chalk)' : '';
    }
    btnA.onclick = ()=>{ selectedPenalty='A'; highlightPenalty(); };
    btnB.onclick = ()=>{ selectedPenalty='B'; highlightPenalty(); };
    highlightPenalty();

    const saInput = row.querySelector(`#sa-${m.id}`);
    const sbInput = row.querySelector(`#sb-${m.id}`);
    function checkDraw(){
      const sa = saInput.value, sb = sbInput.value;
      penBox.style.display = (sa!=='' && sb!=='' && parseInt(sa)===parseInt(sb)) ? 'block' : 'none';
    }
    saInput.addEventListener('input', checkDraw);
    sbInput.addEventListener('input', checkDraw);
    checkDraw();

    const btn = el(`<button class="primary" style="margin-top:12px;">${hasSavedPick ? 'Update Prediction' : 'Save Prediction'}</button>`);
    btn.onclick = ()=>{
      const sa = saInput.value, sb = sbInput.value;
      const flashWarning = (msg)=>{
        const orig = btn.textContent;
        btn.textContent = msg;
        btn.style.background = 'var(--red)';
        btn.style.color = '#fff';
        setTimeout(()=>{ btn.textContent = orig; btn.style.background=''; btn.style.color=''; }, 1400);
      };
      if(sa==='' || sb===''){ flashWarning('Enter both scores'); return; }
      const isDraw = parseInt(sa)===parseInt(sb);
      if(isDraw && !selectedPenalty){ flashWarning('Pick the shootout winner'); return; }
      withButtonFeedback(
        btn,
        ()=> savePrediction(m.id, parseInt(sa), parseInt(sb), isDraw ? selectedPenalty : null),
        hasSavedPick ? 'Updated ✓' : 'Saved ✓'
      );
    };
    body.appendChild(btn);

    if(hasSavedPick){
      const savedPenNote = pred.scoreA===pred.scoreB && pred.penaltyWinner ? ` (${pred.penaltyWinner==='A'?m.teamA:m.teamB} on penalties)` : '';
      body.appendChild(el(`<div class="your-pick-note" style="margin-top:8px;">✓ Currently saved: ${pred.scoreA} – ${pred.scoreB}${savedPenNote}</div>`));
    }
  }

  return ticket;
}

      rbInput.addEventListener('input', adminCheckDraw);
      adminCheckDraw();

      const resultBtn = el(`<button class="amber" style="border:none;">Mark Final</button>`);
      resultBtn.onclick = ()=>{
        const ra = raInput.value, rb = rbInput.value;
        const flashWarning = (msg)=>{
          const orig = resultBtn.textContent;
          resultBtn.textContent = msg;
          setTimeout(()=>{ resultBtn.textContent = orig; }, 1400);
        };
        if(ra==='' || rb===''){ flashWarning('Enter both scores'); return; }
        const isDraw = parseInt(ra)===parseInt(rb);
        if(isDraw && !adminPenaltyWinner){ flashWarning('Pick the shootout winner'); return; }
        withButtonFeedback(resultBtn, ()=> adminSaveResult(m.id, ra, rb, 'completed', isDraw ? adminPenaltyWinner : null), 'Marked Final ✓');
      };
      mc.appendChild(resultBtn);
      app.appendChild(mc);
    });
  });
}

init();
</script>
</body>
</html>
